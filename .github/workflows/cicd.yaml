name: CI/CD Pipeline for User Service

on:
  push:
    branches: [ "dev_yji" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Python 환경 설정 및 테스트 (선택 사항)
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 2. AWS 자격 증명 설정 (Secrets 기반)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 3. Amazon ECR 로그인
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 4. Docker 빌드 및 ECR 푸시
      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ github.event.repository.name }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # 빌드 및 태그 (latest와 커밋해시 둘 다 적용)
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          
          # 푸시
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      # 5. 매니페스트 레포지토리 체크아웃 (Personal Access Token 필요)
      - name: Checkout Manifest Repository
        uses: actions/checkout@v4
        with:
          # Organization 이름인 Salijang을 사용합니다.
          repository: Salijang/sallijang-manifest
          token: ${{ secrets.GHA_TOKEN }} # GitHub Settings에서 생성한 PAT를 Secrets에 등록해야 함
          path: manifest

      # 6. Kustomize 이미지 태그 업데이트 (완전 동적 버전)
      - name: Update Kubernetes resources
        run: |
          cd manifest/base/user
          
          # 변수 설명:
          # 1. ${{ steps.login-ecr.outputs.registry }}: 로그인 단계에서 받아온 '계정ID.dkr.ecr.리전.amazonaws.com'
          # 2. ${{ github.event.repository.name }}: 현재 실행 중인 레포지토리 이름 (sallijang-backend-user)
          
          FULL_IMAGE_NAME="${{ steps.login-ecr.outputs.registry }}/${{ github.event.repository.name }}"
          
          # kustomize edit set image [기존이미지]=[새이미지]:[태그]
          # 기존 이미지 이름과 새 이미지 이름이 같으므로 아래와 같이 작성합니다.
          kustomize edit set image $FULL_IMAGE_NAME=$FULL_IMAGE_NAME:${{ github.sha }}
          
          # 결과 확인
          cat kustomization.yaml
          
          git config --global user.email "github-actions@github.com"
          git config --global user.name "github-actions"
          git add kustomization.yaml
          git commit -m "chore(user): deploy image tag ${{ github.sha }} [skip ci]"
          git push origin main