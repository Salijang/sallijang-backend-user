name: CI/CD Pipeline for User Service

on:
  push:
    branches: [ "dev_yji" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Python 환경 설정 및 테스트 (선택 사항)
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 2. AWS 자격 증명 설정 (Secrets 기반)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 3. Amazon ECR 로그인
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 4. Docker 빌드 및 ECR 푸시
      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ github.event.repository.name }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # 빌드 및 태그 (latest와 커밋해시 둘 다 적용)
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          
          # 푸시
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      # 5. 매니페스트 레포지토리 체크아웃 (Personal Access Token 필요)
      - name: Checkout Manifest Repository
        uses: actions/checkout@v4
        with:
          # Organization 이름인 Salijang을 사용합니다.
          repository: Salijang/sallijang-manifest
          token: ${{ secrets.GH_PAT }} # GitHub Settings에서 생성한 PAT를 Secrets에 등록해야 함
          path: manifest

      # 6. Kustomize를 사용하여 이미지 태그 업데이트 및 푸시
      - name: Update Kubernetes resources
        run: |
          cd manifest/base/user # user 서비스 폴더로 이동
          
          # kustomization.yaml의 newTag를 현재 빌드된 이미지 태그(github.sha)로 치환
          # 이 작업이 완료되어야 ArgoCD가 변경 사항을 감지합니다.
          sed -i "s/newTag: .*/newTag: ${{ github.sha }}/g" kustomization.yaml
          
          # Git Push 설정
          git config --global user.email "github-actions@github.com"
          git config --global user.name "github-actions"
          git add .
          git commit -m "chore(user): update image tag to ${{ github.sha }} [skip ci]"
          git push origin main